<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Organization and Employee Details - React Example</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .EmployeeDetails {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 320px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      input, button {
        padding: 8px;
        font-size: 14px;
      }
      button {
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      // EmployeeDetails (Hijo)
      class EmployeeDetails extends React.Component {
        constructor(props) {
          super(props);
          this.state = {
            emp_id: "",
            emp_email: ""
          };
        }

        handleInputChange = (event) => {
          const { name, value } = event.target;
          this.setState({ [name]: value });
        };

        render() {
          const { emp_id, emp_email } = this.state;
          const { employee_designation } = this.props;

          return (
            <div className="EmployeeDetails">
              <h3>Employee Details</h3>
              <input
                type="text"
                name="emp_id"
                value={emp_id}
                onChange={this.handleInputChange}
                placeholder="Enter Employee ID"
              />
              <input
                type="email"
                name="emp_email"
                value={emp_email}
                onChange={this.handleInputChange}
                placeholder="Enter Employee Email"
              />
              <button
                onClick={() =>
                  alert(
                    `Employee ID: ${emp_id}\nEmail: ${emp_email}\nDesignation: ${employee_designation}`
                  )
                }
              >
                Show Details
              </button>
            </div>
          );
        }
      }

      // OrganizationDetails (Padre)
      function OrganizationDetails() {
        let employee_designation = "Project Manager";
        return (
          <>
            <EmployeeDetails employee_designation={employee_designation} />
          </>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<OrganizationDetails />);
    </script>
  </body>
</html>
